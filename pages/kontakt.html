<div class="contact-page">
    <!-- Linke Seite - Kontakt Informationen -->
    <div class="contact-info">
        <h2>Kontakt Informationen</h2>

        <div class="info-card">
            <h3>🏢 Hauptsitz</h3>
            <p><strong>ACENCIA GmbH</strong></p>
            <p>Hackenheim, Deutschland</p>
        </div>

        <div class="info-card">
            <h3>✉️ E-Mail</h3>
            <p class="highlight">info@acencia.de</p>
        </div>

        <div class="info-card">
            <h3>📞 Telefon</h3>
            <p class="highlight">+49 671 79 65 8 0</p>
        </div>

        <div class="info-card">
            <h3>🕒 Geschäftszeiten</h3>
            <p><strong>Montag - Freitag:</strong> 9:00 - 18:00</p>
            <p><strong>Samstag:</strong> 10:00 - 14:00</p>
        </div>
    </div>

    <!-- Rechte Seite - Kontaktformular -->
    <div class="contact-form-section">
        <h2>Nachricht senden</h2>

        <div class="form-container">
            <form>
                <div class="form-row">
                    <div class="form-group">
                        <label>Name *</label>
                        <input type="text" placeholder="Ihr vollständiger Name" required>
                    </div>
                    <div class="form-group">
                        <label>E-Mail *</label>
                        <input type="email" placeholder="ihre@email.de" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Unternehmen</label>
                        <input type="text" placeholder="Ihr Unternehmen">
                    </div>
                    <div class="form-group">
                        <label>Telefon</label>
                        <input type="tel" placeholder="+49 (0) 123 456789">
                    </div>
                </div>

                <div class="form-group">
                    <label>Nachricht *</label>
                    <textarea rows="6" placeholder="Wie können wir Ihnen helfen?" required></textarea>
                </div>

                <button type="submit" class="submit-button">
                    ✈️ Nachricht senden
                </button>
            </form>
        </div>
    </div>
</div>
